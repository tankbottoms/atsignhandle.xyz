  <style>
    * { box-sizing: border-box; }
    body {
      background: #f7f7f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .game-info {
      text-align: center;
      padding: 8px 16px;
      margin: 0 auto;
      max-width: 480px;
      padding-top: 10em;
    }
    .game-desc {
      color: #666;
      font-size: 11px;
      font-family: monospace;
      line-height: 1.5;
      margin: 0 0 12px;
    }
    .game-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .control-item {
      color: #888;
      font-size: 10px;
      font-family: monospace;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      vertical-align: middle;
    }
    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 3px 10px;
      min-width: 32px;
      height: 24px;
      box-sizing: border-box;
      font-size: 10px;
      font-family: monospace;
      color: #555;
      vertical-align: middle;
    }
    .section-rule {
      border: none;
      border-top: 1px solid #ddd;
      margin: 0 auto 10px;
    }
    .toggle-bar {
      text-align: center;
      margin: 6px 0 2px;
      visibility: hidden;
    }
    .toggle-bar.ready {
      visibility: visible;
    }
    .toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 3px 10px;
      min-width: 32px;
      height: 24px;
      box-sizing: border-box;
      font-size: 10px;
      font-family: monospace;
      color: #555;
      cursor: pointer;
      transition: background 0.15s;
      vertical-align: middle;
    }
    .toggle-btn i.fas,
    .toggle-btn .emoji-icon {
      font-size: 12px;
      line-height: 1;
    }
    .toggle-btn:hover {
      background: #ddd;
    }
    .toggle-btn.active {
      background: #535353;
      color: #f7f7f7;
      border-color: #535353;
    }
    .toggle-btn {
      position: relative;
    }
    .btn-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 9px;
      font-family: monospace;
      padding: 4px 8px;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .btn-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #333;
    }
    .toggle-btn:hover .btn-tooltip,
    .toggle-btn.tooltip-visible .btn-tooltip {
      opacity: 1;
    }
    .interstitial-wrapper {
      position: relative;
      margin: 0 auto;
      max-width: 600px;
      padding-top: 10px;
    }
    #offline-resources {
      display: none;
    }
  </style>
</head>
<body class="offline">
  <div class="game-info">
    <p class="game-desc">
      <span id="character-name">You are Banny the banana.</span><br>
      Jump over bongs and pot plants.<br>
      Duck under <span id="obstacle-name">pterodactyls</span>.<br>
      Survive.
    </p>
    <hr class="section-rule">
    <div class="game-controls">
      <span class="control-item"><span class="key">SPACE</span> / <span class="key">&uarr;</span> jump</span>
      <span class="control-item"><span class="key">&darr;</span> duck</span>
      <span class="control-item"><span class="key">ENTER</span> restart</span>
      <span class="control-item"><span class="key">P</span> pause</span>
    </div>
    <div class="toggle-bar">
      <button class="toggle-btn" id="toggle-1x" onclick="setResolution(1)"><span class="btn-tooltip">Native 600px resolution</span>1x</button>
      <button class="toggle-btn" id="toggle-auto" onclick="setResolution(0)"><span class="btn-tooltip">Scale to fit window</span>auto</button>
      <button class="toggle-btn" id="toggle-2x" onclick="setResolution(2)"><span class="btn-tooltip">Force 2x upscale</span>2x</button>
      <span style="display:inline-block;width:12px"></span>
      <button class="toggle-btn" id="toggle-sound" onclick="toggleSound()"><span class="btn-tooltip">Toggle game sounds</span>sound</button>
      <button class="toggle-btn" id="toggle-custom" onclick="toggleCustomAudio()"><span class="btn-tooltip">Use custom audio by Mark</span>mark</button>
      <span style="display:inline-block;width:12px"></span>
      <button class="toggle-btn" id="theme-ufo" onclick="setTheme('ufo')"><span class="btn-tooltip">UFO obstacle theme</span><i class="fas fa-ufo"></i></button>
      <button class="toggle-btn" id="theme-pterodactyl" onclick="setTheme('pterodactyl')"><span class="btn-tooltip">Pterodactyl obstacle theme</span><span class="emoji-icon">&#x1F996;</span></button>
      <button class="toggle-btn" id="theme-birds" onclick="setTheme('birds')"><span class="btn-tooltip">Bird obstacle theme</span><i class="fas fa-crow"></i></button>
      <button class="toggle-btn" id="theme-legal" onclick="setTheme('legal')"><span class="btn-tooltip">Steamboat Willie theme</span><span class="emoji-icon">&#x1F42D;</span></button>
    </div>
  </div>

  <div class="interstitial-wrapper">
    <div id="main-content">
      <div class="icon icon-offline" alt="Banny"></div>
    </div>
  </div>

  <script>
    var THEME_SPRITES = {
      ufo:         { '1x': 'assets/100_banny_plus_UFO.png',         '2x': 'assets/200_banny_plus_UFO.png' },
      pterodactyl: { '1x': 'assets/100_banny_plus_pterodactyl.png', '2x': 'assets/100_banny_plus_pterodactyl.png' },
      birds:       { '1x': 'assets/100_banny_plus_birds.png',       '2x': 'assets/100_banny_plus_birds.png' },
      legal:       { '1x': 'assets/100_steamboat_will_plus_UFO.png', '2x': 'assets/100_steamboat_will_plus_UFO.png' }
    };

    (function() {
      var saved = sessionStorage.getItem('bannyRes');
      if (saved) window.__forceRes = parseInt(saved, 10);
      else window.__forceRes = 0;

      var soundSaved = sessionStorage.getItem('bannySound');
      window.__soundEnabled = soundSaved !== 'off';

      var customSaved = sessionStorage.getItem('bannyCustomAudio');
      window.__customAudio = customSaved === 'on';

      var THEME_NAMES = { ufo: 'UFOs', pterodactyl: 'pterodactyls', birds: 'birds', legal: 'UFOs' };
      var THEME_CHARS = { ufo: 'You are Banny the banana.', pterodactyl: 'You are Banny the banana.', birds: 'You are Banny the banana.', legal: 'You are Steamboat Willie.' };
      var theme = sessionStorage.getItem('bannyTheme') || 'pterodactyl';
      window.__theme = theme;

      // Apply sprite src before game loads
      var sprites = THEME_SPRITES[theme] || THEME_SPRITES.pterodactyl;
      var img1x = document.getElementById('offline-resources-1x');
      var img2x = document.getElementById('offline-resources-2x');
      if (img1x) img1x.src = sprites['1x'];
      if (img2x) img2x.src = sprites['2x'];

      document.addEventListener('DOMContentLoaded', function() {
        var resId = window.__forceRes === 1 ? 'toggle-1x' :
                    window.__forceRes === 2 ? 'toggle-2x' : 'toggle-auto';
        document.getElementById(resId).classList.add('active');

        document.getElementById('obstacle-name').textContent = THEME_NAMES[window.__theme] || 'pterodactyls';
        document.getElementById('character-name').textContent = THEME_CHARS[window.__theme] || 'You are Banny the banana.';
        if (window.__soundEnabled) document.getElementById('toggle-sound').classList.add('active');
        if (window.__customAudio) document.getElementById('toggle-custom').classList.add('active');
        document.getElementById('theme-' + window.__theme).classList.add('active');

        document.querySelector('.toggle-bar').classList.add('ready');
      });
    })();
    function setResolution(mode) {
      sessionStorage.setItem('bannyRes', mode);
      window.location.reload();
    }
    function toggleSound() {
      window.__soundEnabled = !window.__soundEnabled;
      sessionStorage.setItem('bannySound', window.__soundEnabled ? 'on' : 'off');
      document.getElementById('toggle-sound').classList.toggle('active', window.__soundEnabled);
    }
    function toggleCustomAudio() {
      window.__customAudio = !window.__customAudio;
      sessionStorage.setItem('bannyCustomAudio', window.__customAudio ? 'on' : 'off');
      document.getElementById('toggle-custom').classList.toggle('active', window.__customAudio);
    }
    function setTheme(theme) {
      sessionStorage.setItem('bannyTheme', theme);
      window.location.reload();
    }

    // Touch tooltip support: long-press shows tooltip, release or timeout hides it
    (function() {
      var tooltipTimer = null;
      var activeBtn = null;

      function showTooltip(btn) {
        hideTooltip();
        btn.classList.add('tooltip-visible');
        activeBtn = btn;
        tooltipTimer = setTimeout(hideTooltip, 2000);
      }

      function hideTooltip() {
        if (activeBtn) {
          activeBtn.classList.remove('tooltip-visible');
          activeBtn = null;
        }
        if (tooltipTimer) {
          clearTimeout(tooltipTimer);
          tooltipTimer = null;
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        var btns = document.querySelectorAll('.toggle-btn');
        btns.forEach(function(btn) {
          btn.addEventListener('touchstart', function(e) {
            showTooltip(btn);
          }, { passive: true });
          btn.addEventListener('touchend', function() {
            setTimeout(hideTooltip, 300);
          });
          btn.addEventListener('touchcancel', hideTooltip);
        });
      });
    })();
  </script>

name = "atsignhandle-xyz"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

routes = [
  { pattern = "atsignhandle.xyz", custom_domain = true },
  { pattern = "www.atsignhandle.xyz", custom_domain = true }
]

[assets]
